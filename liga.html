<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width", initial-scale=1">
    <title> TypeGame </title>
    <link rel="icon" type="image/x-icon" href="assets/patoIcon.png">
    <link rel="stylesheet" href="styleLiga.css">    
</head>
<body>
    <div id="ligas">
        <div class="imgLateral">
	    <img class="btn" src="assets/arrow.png" alt="voltar">
	</div>
        <div class="main">
	    <div class="leaderBoard" id="header">
	        <div class="nomeLiga"> <h1> Lagoa Tranquila </h1> </div>
	    </div>
	    <div class="leaderBoard" id="rank">
		<div id="p1" class="player"> 
                    <p class="atribPlayer pos" id="pos1"> 1 </p>
		    <img class="atribPlayer avatar" id="avtTeste" alt="Teste"> 
		    <p class="atribPlayer nomePlayer" id="nomeTeste"> Teste </p>
		    <p class="atribPlayer pontuacao" id="pontTeste"> 0 </p>
		</div>
	    </div>
	    <div class="leaderBoard" id="footer">
		<div class="btnLeaderboard"> Criar liga </div>
		<div class="btnLeaderboard"> Entrar em uma liga </div>
	    </div> 
	</div>
        <div class="imgLateral"></div>
    </div>
</body>
</html>
