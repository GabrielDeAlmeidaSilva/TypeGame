<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width", initial-scale=1">
    <title> TypeGame </title>
    <link rel="icon" type="image/x-icon" href="assets/patoIcon.png">
    <link rel="stylesheet" href="styleLiga.css">    
</head>
<body>
    <div id="ahh">
        <div id="header">
	    <img id="pato" src="./assets/patoIcon.png" alt="Retornar ao jogo">
	    <div id="titulo">
		<h2> Ligas </h2>
	    </div>
	    <div id="entrar">
		<form class="formulario">
		    <input type="text" id="nomeLiga" name="nomeLiga" placeholder="Nome">
	            <input type="text" id="codLiga" name="codLiga" placeholder="Código">
		    <button type="button"> Entrar </button>
		</form>
	    </div>
   	    <button type="button"> Criar liga </button>
	</div>
        <div id="ligaAtual">
	    <h1> ahhh </h1>
        </div>
        <div id="main">
	    <div id="ligasAtivas">
	        <div class="liga" id="liga1"> ahh </div>
	    </div>
	    <div id="semanal" class="leaderboard">
	        <h2> Semanal </h2>
  	        <div id="p1" class="player">
		    <div id="pos1" class="pos"> 1 </div>
		    <div id="pTeste" class="pNome"> Teste </div>
		    <div id="pont1" class="pont"> 0 </div>
	        </div>
	    </div>
	    <div id="geral" class="leaderboard">
	        <h2> Geral </h2>
  	        <div id="p1" class="player">
		    <div id="pos1" class="pos"> 1 </div>
		    <div id="pTeste" class="pNome"> Teste </div>
		    <div id="pont1" class="pont"> 0 </div>
	        </div>
	    </div>

        </div>
    </div>
</body>
</html>
